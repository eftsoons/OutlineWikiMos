services:
  outline:
    # image: docker.getoutline.com/outlinewiki/outline:latest
    image: outline
    env_file: ./.env.docker
    expose:
      - "3000"
    volumes:
      - storage-data:/var/lib/outline/data
    depends_on:
      - postgres
      - redis

  redis:
    image: redis
    ports:
      - "127.0.0.1:6379:6379"
    user: "redis:redis"

  postgres:
    image: postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: outline

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    links:
      - outline
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./localhost.pem:/etc/nginx/certs/localhost.pem:ro
      - ./localhost-key.pem:/etc/nginx/certs/localhost-key.pem:ro

volumes:
  storage-data:
