services:
  outline:
    # image: docker.getoutline.com/outlinewiki/outline:latest
    image: outline
    env_file: ./docker.env
    expose:
      - "3000"
    volumes:
      - storage-data:/var/lib/outline/data
    depends_on:
      - postgres
      - redis

  redis:
    image: redis
    env_file: ./docker.env
    expose:
      - "6379"
    volumes:
      - ./redis.conf:/redis.conf
    command: ["redis-server", "/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3

  postgres:
    image: postgres:18
    env_file: ./docker.env
    expose:
      - "5432"
    volumes:
      - database-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "outline", "-U", "user"]
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "pass"
      POSTGRES_DB: "outline"

  nginx:
    image: nginx:alpine
    container_name: local-nginx
    ports:
      - "80:80"
      - "443:443"
    links:
      - outline
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./localhost.pem:/etc/nginx/certs/localhost.pem:ro
      - ./localhost-key.pem:/etc/nginx/certs/localhost-key.pem:ro

volumes:
  https-portal-data:
  storage-data:
  database-data:
